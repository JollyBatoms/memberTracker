<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GECC Uniport — Positions</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue:#0066cc; --green:#28a745; --red:#dc3545; --sidebar-w:240px; }
    html, body { height:100%; font-family:'Open Sans',sans-serif; background:#f7f9fc; color:#1a1a1a; }

    .admin-bar { display:none; position:fixed; top:0; left:0; right:0; height:28px; background:#0066cc; align-items:center; justify-content:center; font-size:.72rem; font-weight:700; color:#fff; letter-spacing:.08em; text-transform:uppercase; z-index:200; }
    .admin-bar.show { display:flex; }
    .admin-bar.member-bar { background:#28a745; }
    .admin-bar.super-bar { background:linear-gradient(90deg,#0066cc,#6c63ff); }
    .admin-bar span { opacity:.8; font-weight:400; margin-left:.5rem; text-transform:none; letter-spacing:0; }

    .sidebar { position:fixed; top:0; left:0; width:var(--sidebar-w); height:100vh; background:#fff; border-right:1px solid #dde3ec; display:flex; flex-direction:column; z-index:100; transition:transform .3s; }
    .sidebar.offset { top:28px; height:calc(100vh - 28px); }
    .sidebar-brand { display:flex; align-items:center; gap:.7rem; padding:1rem 1.1rem; border-bottom:1px solid #dde3ec; cursor:pointer; }
    .brand-logos { display:flex; align-items:center; gap:.3rem; }
    .brand-logo { width:30px; height:30px; border-radius:50%; overflow:hidden; border:1px solid #dde3ec; }
    .brand-logo img { width:100%; height:100%; object-fit:contain; }
    .brand-text { display:flex; flex-direction:column; line-height:1.25; }
    .brand-name { font-family:'Merriweather',serif; font-size:.75rem; font-weight:700; color:#0066cc; }
    .brand-sub { font-size:.6rem; color:#999; letter-spacing:.06em; text-transform:uppercase; }
    .nav-section { flex:1; overflow-y:auto; padding:.6rem 0; }
    .nav-label { font-size:.6rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#aaa; padding:.6rem 1.1rem .25rem; }
    .nav-item { display:flex; align-items:center; gap:.65rem; padding:.6rem 1.1rem; color:#555; font-size:.85rem; font-weight:600; text-decoration:none; border-left:3px solid transparent; transition:color .2s,background .2s,border-color .2s; }
    .nav-item:hover { color:#0066cc; background:#f0f5ff; }
    .nav-item.active { color:#0066cc; background:#eef4ff; border-left-color:#0066cc; }
    .nav-item .icon { width:20px; text-align:center; flex-shrink:0; }
    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24; font-size:1.15rem; line-height:1; }
    .nav-bottom { border-top:1px solid #dde3ec; padding:.5rem 0; }
    .btn-logout { display:flex; align-items:center; gap:.65rem; padding:.6rem 1.1rem; width:100%; background:none; border:none; color:#dc3545; font-family:'Open Sans',sans-serif; font-size:.85rem; font-weight:700; cursor:pointer; transition:background .2s; }
    .btn-logout:hover { background:#fff5f5; }

    .topbar { display:none; position:fixed; top:0; left:0; right:0; height:54px; background:#fff; border-bottom:1px solid #dde3ec; align-items:center; justify-content:space-between; padding:0 1rem; z-index:99; }
    .topbar.offset { top:28px; }
    .topbar-brand { display:flex; align-items:center; gap:.5rem; font-family:'Merriweather',serif; font-size:.8rem; font-weight:700; color:#0066cc; cursor:pointer; }
    .topbar-brand .brand-logo { width:26px; height:26px; }
    .hamburger { background:none; border:none; cursor:pointer; color:#555; padding:.3rem; display:flex; flex-direction:column; gap:5px; }
    .hamburger span { display:block; width:22px; height:2px; background:currentColor; border-radius:2px; }
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:98; }
    .overlay.show { display:block; }

    .main { margin-left:var(--sidebar-w); min-height:100vh; }
    .main.offset { margin-top:28px; }
    .main-bar { height:4px; background:#0066cc; }
    .main-bar.member-bar { background:#28a745; }
    .main-bar.super-bar { background:linear-gradient(90deg,#0066cc,#6c63ff); }
    .content { padding:1.8rem; }

    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.4rem; flex-wrap:wrap; gap:.8rem; }
    .page-header h1 { font-family:'Merriweather',serif; font-size:1.2rem; font-weight:700; }

    .view-notice { background:#f0f5ff; border:1px solid #c5d9f5; border-radius:6px; padding:.7rem 1rem; font-size:.8rem; color:#0066cc; font-weight:600; margin-bottom:1rem; display:none; }
    .view-notice.show { display:block; }

    /* Section headers */
    .section-title { font-family:'Merriweather',serif; font-size:.88rem; font-weight:700; color:#333; margin:1.4rem 0 .8rem; display:flex; align-items:center; gap:.5rem; padding-bottom:.5rem; border-bottom:2px solid #edf0f4; }
    .section-title .material-symbols-outlined { color:#0066cc; font-size:1.1rem; }

    /* Positions grid */
    .positions-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:.9rem; }

    .pos-card { background:#fff; border:1px solid #dde3ec; border-radius:8px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.04); transition:box-shadow .2s,border-color .2s; }
    .pos-card:hover { box-shadow:0 3px 12px rgba(0,0,0,.08); border-color:#c5d9f5; }
    .pos-card.occupied { border-left:3px solid #0066cc; }
    .pos-card.vacant   { border-left:3px solid #dde3ec; }

    .pos-card-body { padding:.9rem 1rem; display:flex; align-items:center; gap:.85rem; }
    .pos-icon { width:40px; height:40px; border-radius:8px; background:#eef4ff; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .pos-icon .material-symbols-outlined { color:#0066cc; font-size:1.2rem; }
    .pos-icon.vacant-icon { background:#f5f5f5; }
    .pos-icon.vacant-icon .material-symbols-outlined { color:#bbb; }
    .pos-details { flex:1; min-width:0; }
    .pos-name { font-size:.85rem; font-weight:700; color:#1a1a1a; margin-bottom:.15rem; }
    .pos-holder { font-size:.8rem; color:#0066cc; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .pos-holder.vacant-text { color:#bbb; font-style:italic; font-weight:400; }
    .pos-since { font-size:.68rem; color:#aaa; margin-top:.1rem; }
    .pos-status { flex-shrink:0; }
    .badge { display:inline-block; font-size:.62rem; font-weight:700; padding:.18rem .55rem; border-radius:20px; }
    .badge-active  { background:#eef4ff; color:#0066cc; }
    .badge-vacant  { background:#f5f5f5; color:#aaa; border:1px solid #dde3ec; }

    .pos-history-preview { padding:.4rem 1rem .6rem; border-top:1px solid #f5f5f5; }
    .pos-history-preview-item { font-size:.72rem; color:#888; display:flex; align-items:center; gap:.35rem; padding:.15rem 0; }
    .pos-history-preview-item::before { content:''; width:5px; height:5px; border-radius:50%; background:#dde3ec; flex-shrink:0; }

    .pos-footer { padding:.65rem 1rem; border-top:1px solid #f0f0f0; display:flex; gap:.4rem; flex-wrap:wrap; align-items:center; }
    .btn-xs { padding:.35rem .75rem; font-family:'Open Sans',sans-serif; font-size:.72rem; font-weight:700; border-radius:4px; cursor:pointer; border:1px solid; transition:all .2s; display:inline-flex; align-items:center; gap:.3rem; }
    .btn-xs .material-symbols-outlined { font-size:.85rem; }
    .btn-xs-assign   { background:#eef4ff; color:#0066cc; border-color:#c5d9f5; }
    .btn-xs-assign:hover { background:#d6e8ff; }
    .btn-xs-transfer { background:#eafaf0; color:#1e7e34; border-color:#b7dfca; }
    .btn-xs-transfer:hover { background:#d4f0e3; }
    .btn-xs-clear    { background:#fff0f0; color:#dc3545; border-color:#f5c0c5; }
    .btn-xs-clear:hover { background:#fdd; }
    .btn-xs-history  { background:#f7f9fc; color:#555; border-color:#dde3ec; }
    .btn-xs-history:hover { background:#eef4ff; color:#0066cc; border-color:#0066cc; }

    /* Ex-officials section */
    .exoff-list { display:flex; flex-direction:column; gap:.5rem; }
    .exoff-card { background:#fff; border:1px solid #dde3ec; border-radius:8px; padding:.8rem 1rem; display:flex; align-items:center; gap:.85rem; box-shadow:0 1px 3px rgba(0,0,0,.04); }
    .exoff-avatar { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.9rem; font-weight:700; color:#fff; flex-shrink:0; background:linear-gradient(135deg,#6f42c1,#e83e8c); }
    .exoff-info { flex:1; min-width:0; }
    .exoff-name { font-size:.88rem; font-weight:700; color:#1a1a1a; }
    .exoff-sub  { font-size:.73rem; color:#888; margin-top:.1rem; }
    .btn-xs-remove { background:#fff0f0; color:#dc3545; border-color:#f5c0c5; }
    .btn-xs-remove:hover { background:#fdd; }

    .empty-notice { background:#f7f9fc; border:1px solid #edf0f4; border-radius:6px; padding:.9rem 1rem; font-size:.82rem; color:#aaa; text-align:center; }

    /* Modals */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:500; align-items:center; justify-content:center; padding:1rem; }
    .modal-overlay.show { display:flex; }
    .modal { background:#fff; border-radius:8px; width:100%; max-width:460px; max-height:90vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,.15); }
    .modal-header { display:flex; align-items:center; justify-content:space-between; padding:1.2rem 1.4rem; border-bottom:1px solid #edf0f4; position:sticky; top:0; background:#fff; z-index:2; }
    .modal-title { font-family:'Merriweather',serif; font-size:1rem; font-weight:700; color:#0066cc; }
    .modal-close { background:none; border:none; font-size:1.6rem; cursor:pointer; color:#888; line-height:1; }
    .modal-body { padding:1.4rem; }
    .modal-footer { padding:1rem 1.4rem; border-top:1px solid #edf0f4; display:flex; justify-content:flex-end; gap:.6rem; position:sticky; bottom:0; background:#fff; }
    .btn-primary { display:inline-flex; align-items:center; gap:.4rem; padding:.6rem 1.1rem; background:#0066cc; color:#fff; font-family:'Open Sans',sans-serif; font-size:.82rem; font-weight:700; border:none; border-radius:5px; cursor:pointer; }
    .btn-primary:hover { background:#0052a3; }
    .btn-primary:disabled { opacity:.6; cursor:not-allowed; }
    .btn-secondary { padding:.6rem 1.1rem; background:transparent; color:#555; font-family:'Open Sans',sans-serif; font-size:.82rem; font-weight:700; border:1.5px solid #ccd4df; border-radius:5px; cursor:pointer; }

    .form-group { display:flex; flex-direction:column; gap:.35rem; margin-bottom:.9rem; }
    .form-group label { font-size:.72rem; font-weight:700; color:#444; }
    .form-group input, .form-group select { padding:.68rem .85rem; border:1.5px solid #ccd4df; border-radius:5px; font-family:'Open Sans',sans-serif; font-size:.88rem; color:#1a1a1a; background:#fff; outline:none;
