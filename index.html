<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GECC Uniport — Member Portal</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Open Sans', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
    }

    /* ── Top blue header bar ── */
    .header-bar {
      background: #0066cc;
      height: 8px;
      width: 100%;
    }

    /* ── Page wrapper ── */
    .page {
      min-height: calc(100vh - 8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.5rem;
      background: #f7f9fc;
    }

    /* ── White card ── */
    .card {
      background: #ffffff;
      border: 1px solid #dde3ec;
      border-radius: 8px;
      padding: 3rem 2.5rem 2.5rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,.08);
    }

    /* ── Logo row ── */
    .logos {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 1.8rem;
    }

    .logo-img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      cursor: pointer;
      transition: transform .2s;
    }
    .logo-img:hover { transform: scale(1.05); }

    .logo-divider {
      width: 1px;
      height: 70px;
      background: #dde3ec;
    }

    /* ── Text ── */
    .org-name {
      font-family: 'Merriweather', serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: #0066cc;
      line-height: 1.3;
      margin-bottom: .4rem;
    }

    .chapter {
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: .8rem;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: #0066cc;
      margin: 0 auto .9rem;
      border-radius: 2px;
    }

    .motto {
      font-size: .9rem;
      color: #555;
      font-style: italic;
      margin-bottom: 2rem;
      line-height: 1.5;
    }
    .motto strong {
      color: #0066cc;
      font-style: normal;
    }

    /* ── Button ── */
    .btn-continue {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      width: 100%;
      padding: .85rem;
      background: #0066cc;
      color: #fff;
      font-family: 'Open Sans', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s, transform .15s;
    }
    .btn-continue:hover { background: #0052a3; transform: translateY(-1px); }
    .btn-continue:active { transform: translateY(0); }

    /* ── Footer ── */
    .footer {
      margin-top: 1.8rem;
      font-size: .7rem;
      color: #aaa;
      letter-spacing: .06em;
    }

    @media (max-width: 400px) {
      .card { padding: 2rem 1.3rem; }
      .logo-img { width: 72px; height: 72px; }
      .org-name { font-size: 1.1rem; }
    }
  
  </style>
</head>
