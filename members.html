<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GECC Uniport — Members</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue:#0066cc; --green:#28a745; --red:#dc3545; --sidebar-w:240px; }
    html, body { height:100%; font-family:'Open Sans',sans-serif; background:#f7f9fc; color:#1a1a1a; }

    .admin-bar { display:none; position:fixed; top:0; left:0; right:0; height:28px; background:#0066cc; align-items:center; justify-content:center; font-size:.72rem; font-weight:700; color:#fff; letter-spacing:.08em; text-transform:uppercase; z-index:200; }
    .admin-bar.show { display:flex; }
    .admin-bar span { opacity:.7; font-weight:400; margin-left:.5rem; text-transform:none; letter-spacing:0; }

    .sidebar { position:fixed; top:0; left:0; width:var(--sidebar-w); height:100vh; background:#fff; border-right:1px solid #dde3ec; display:flex; flex-direction:column; z-index:100; transition:transform .3s; }
    .sidebar.admin-offset { top:28px; height:calc(100vh - 28px); }
    .sidebar-brand { display:flex; align-items:center; gap:.7rem; padding:1rem 1.1rem; border-bottom:1px solid #dde3ec; cursor:pointer; }
    .brand-logos { display:flex; align-items:center; gap:.3rem; }
    .brand-logo { width:30px; height:30px; border-radius:50%; overflow:hidden; border:1px solid #dde3ec; }
    .brand-logo img { width:100%; height:100%; object-fit:contain; }
    .brand-text { display:flex; flex-direction:column; line-height:1.25; }
    .brand-name { font-family:'Merriweather',serif; font-size:.75rem; font-weight:700; color:#0066cc; }
    .brand-sub { font-size:.6rem; color:#999; letter-spacing:.06em; text-transform:uppercase; }
    .nav-section { flex:1; overflow-y:auto; padding:.6rem 0; }
    .nav-label { font-size:.6rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#aaa; padding:.6rem 1.1rem .25rem; }
    .nav-item { display:flex; align-items:center; gap:.65rem; padding:.6rem 1.1rem; color:#555; font-size:.85rem; font-weight:600; text-decoration:none; border-left:3px solid transparent; transition:color .2s,background .2s,border-color .2s; }
    .nav-item:hover { color:#0066cc; background:#f0f5ff; }
    .nav-item.active { color:#0066cc; background:#eef4ff; border-left-color:#0066cc; }
    .nav-item .icon { width:18px; text-align:center; font-size:.95rem; }
    .nav-bottom { border-top:1px solid #dde3ec; padding:.5rem 0; }
    .btn-logout { display:flex; align-items:center; gap:.65rem; padding:.6rem 1.1rem; width:100%; background:none; border:none; color:#dc3545; font-family:'Open Sans',sans-serif; font-size:.85rem; font-weight:700; cursor:pointer; transition:background .2s; }
    .btn-logout:hover { background:#fff5f5; }

    .topbar { display:none; position:fixed; top:0; left:0; right:0; height:54px; background:#fff; border-bottom:1px solid #dde3ec; align-items:center; justify-content:space-between; padding:0 1rem; z-index:99; }
    .topbar.admin-offset { top:28px; }
    .topbar-brand { display:flex; align-items:center; gap:.5rem; font-family:'Merriweather',serif; font-size:.8rem; font-weight:700; color:#0066cc; cursor:pointer; }
    .topbar-brand .brand-logo { width:26px; height:26px; }
    .hamburger { background:none; border:none; cursor:pointer; color:#555; padding:.3rem; display:flex; flex-direction:column; gap:5px; }
    .hamburger span { display:block; width:22px; height:2px; background:currentColor; border-radius:2px; }
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:98; }
    .overlay.show { display:block; }

    .main { margin-left:var(--sidebar-w); min-height:100vh; }
    .main.admin-offset { margin-top:28px; }
    .main-bar { height:4px; background:#0066cc; }
    .content { padding:1.8rem; }

    /* PAGE HEADER */
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.4rem; flex-wrap:wrap; gap:.8rem; }
    .page-header h1 { font-family:'Merriweather',serif; font-size:1.2rem; font-weight:700; }
    .header-actions { display:flex; align-items:center; gap:.6rem; flex-wrap:wrap; }
    .btn-primary { display:inline-flex; align-items:center; gap:.4rem; padding:.6rem 1.1rem; background:#0066cc; color:#fff; font-family:'Open Sans',sans-serif; font-size:.82rem; font-weight:700; border:none; border-radius:5px; cursor:pointer; text-decoration:none; transition:background .2s; }
    .btn-primary:hover { background:#0052a3; }
    .btn-outline { display:inline-flex; align-items:center; gap:.4rem; padding:.6rem 1.1rem; background:transparent; color:#0066cc; font-family:'Open Sans',sans-serif; font-size:.82rem; font-weight:700; border:1.5px solid #0066cc; border-radius:5px; cursor:pointer; transition:background .2s,color .2s; }
    .btn-outline:hover { background:#eef4ff; }

    /* TOOLBAR */
    .toolbar { display:flex; align-items:center; gap:.7rem; margin-bottom:1.2rem; flex-wrap:wrap; }
    .search-wrap { position:relative; flex:1; min-width:200px; }
    .search-wrap input { width:100%; padding:.65rem .9rem .65rem 2.2rem; border:1.5px solid #ccd4df; border-radius:5px; font-family:'Open Sans',sans-serif; font-size:.88rem; color:#1a1a1a; outline:none; transition:border-color .2s; }
    .search-wrap input:focus { border-color:#0066cc; }
    .search-icon { position:absolute; left:.7rem; top:50%; transform:translateY(-50%); color:#aaa; font-size:.9rem; }
    .filter-btns { display:flex; gap:.4rem; }
    .filter-btn { padding:.5rem .9rem; font-family:'Open Sans',sans-serif; font-size:.78rem; font-weight:700; border:1.5px solid #dde3ec; border-radius:5px; background:#fff; color:#555; cursor:pointer; transition:border-color .2s,color .2s,background .2s; }
    .filter-btn.active { border-color:#0066cc; color:#0066cc; background:#eef4ff; }

    /* STATS ROW */
    .members-stats { display:flex; gap:1rem; margin-bottom:1.4rem; flex-wrap:wrap; }
    .mstat { background:#fff; border:1px solid #dde3ec; border-radius:8px; padding:.8rem 1.1rem; flex:1; min-width:100px; box-shadow:0 1px 4px rgba(0,0,0,.04); }
    .mstat-val { font-size:1.5rem; font-weight:700; color:#0066cc; line-height:1; }
    .mstat-label { font-size:.68rem; color:#999; font-weight:700; text-transform:uppercase; letter-spacing:.06em; margin-top:.2rem; }

    /* MEMBERS GRID */
    .members-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:1rem; }
    .member-card { background:#fff; border:1px solid #dde3ec; border-radius:8px; padding:1.1rem; cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,.04); transition:box-shadow .2s,border-color .2s; }
    .member-card:hover { box-shadow:0 4px 12px rgba(0,0,0,.1); border-color:#b0c8f0; }
    .member-card-top { display:flex; align-items:center; gap:.75rem; margin-bottom:.75rem; }
    .member-avatar { width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1rem; font-weight:700; color:#fff; flex-shrink:0; }
    .member-card-name { font-size:.9rem; font-weight:700; color:#1a1a1a; line-height:1.2; }
    .member-card-pos { font-size:.72rem; font-weight:700; margin-top:.1rem; }
    .member-card-info { display:flex; flex-direction:column; gap:.28rem; }
    .member-card-row { display:flex; align-items:center; gap:.4rem; font-size:.76rem; color:#666; }
    .member-card-row .lbl { color:#aaa; font-size:.68rem; font-weight:700; text-transform:uppercase; min-width:40px; }
    .fyb-badge { display:inline-block; font-size:.6rem; font-weight:700; background:#fff3cd; color:#856404; border:1px solid #ffc107; border-radius:3px; padding:.1rem .35rem; margin-left:.35rem; }

    .empty-state { text-align:center; padding:3rem 1rem; color:#bbb; }
    .empty-state .big { font-size:2.5rem; margin-bottom:.6rem; }
    .empty-state p { font-size:.88rem; }

    /* MODAL */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:500; align-items:center; justify-content:center; padding:1rem; }
    .modal-overlay.show { display:flex; }
    .modal { background:#fff; border-radius:8px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,.15); }
    .modal-header { display:flex; align-items:center; justify-content:space-between; padding:1.2rem 1.4rem; border-bottom:1px solid #edf0f4; }
    .modal-title { font-family:'Merriweather',serif; font-size:1rem; font-weight:700; color:#0066cc; }
    .modal-close { background:none; border:none; font-size:1.6rem; cursor:pointer; color:#888; line-height:1; }
    .modal-close:hover { color:#333; }
    .modal-body { padding:1.4rem; }

    /* DETAIL VIEW */
    .detail-top { display:flex; align-items:center; gap:1rem; margin-bottom:1.4rem; }
    .detail-avatar { width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.5rem; font-weight:700; color:#fff; flex-shrink:0; }
    .detail-name { font-size:1.1rem; font-weight:700; color:#1a1a1a; }
    .detail-pos { font-size:.8rem; font-weight:700; margin-top:.2rem; }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:.7rem .9rem; margin-bottom:1.2rem; }
    .detail-field { display:flex; flex-direction:column; gap:.2rem; }
    .detail-field .lbl { font-size:.65rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#aaa; }
    .detail-field .val { font-size:.88rem; color:#1a1a1a; font-weight:600; }
    .modal-footer { padding:1rem 1.4rem; border-top:1px solid #edf0f4; display:flex; justify-content:flex-end; gap:.6rem; }
    .btn-danger { padding:.6rem 1.1rem; background:#dc3545; color:#fff; font-family:'Open Sans',sans-serif; font-size:.82rem; font-weight:700; border:none; border-radius:5px; cursor:pointer; transition:background .2s; }
    .btn-danger:hover { background:#b02a37; }
    .btn-secondary { padding:.6rem 1.1rem; background:transparent; color:#555; font-family:'Open Sans',sans-serif; font-size:.82rem; font-weight:700; border:1.5px solid #ccd4df; border-radius:5px; cursor:pointer; transition:border-color .2s,color .2s; }
    .btn-secondary:hover { border-color:#888; color:#333; }

    /* ADD FORM */
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:.9rem; }
    .form-group { display:flex; flex-direction:column; gap:.35rem; }
    .form-group.full { grid-column:1/-1; }
    .form-group label { font-size:.72rem; font-weight:700; color:#444; letter-spacing:.04em; }
    .form-group input, .form-group select {
      padding:.68rem .85rem; border:1.5px solid #ccd4df; border-radius:5px;
      font-family:'Open Sans',sans-serif; font-size:.88rem; color:#1a1a1a;
      background:#fff; outline:none; transition:border-color .2s;
      appearance:none;
    }
    .form-group input:focus, .form-group select:focus { border-color:#0066cc; }
    .form-group input.invalid, .form-group select.invalid { border-color:#dc3545; }
    .select-wrap { position:relative; }
    .select-wrap::after { content:''; position:absolute; right:.85rem; top:50%; transform:translateY(-50%); border-left:4px solid transparent; border-right:4px solid transparent; border-top:5px solid #888; pointer-events:none; }
    .field-err { font-size:.7rem; color:#dc3545; display:none; }
    .field-err.show { display:block; }
    .dob-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:.5rem; }

    /* POSITION COLORS */
    .pos-member        { color:#28a745; }
    .pos-associates    { color:#8B6F47; }
    .pos-president     { color:#0066cc; }
    .pos-vp            { color:#6c63ff; }
    .pos-gensec        { color:#dc3545; }
    .pos-default       { color:#0066cc; }

    /* TOAST */
    .toast { position:fixed; bottom:1.5rem; right:1.5rem; padding:.8rem 1.3rem; border-radius:6px; font-size:.85rem; font-weight:700; color:#fff; z-index:999; transform:translateY(12px); opacity:0; transition:opacity .3s,transform .3s; pointer-events:none; }
    .toast.show { opacity:1; transform:translateY(0); }
    .toast.success { background:#28a745; }
    .toast.error { background:#dc3545; }

    @media(max-width:768px) {
      .sidebar { transform:translateX(-100%); }
      .sidebar.open { transform:translateX(0); }
      .topbar { display:flex; }
      .main { margin-left:0; padding-top:54px; }
      .main.admin-offset { margin-top:28px; padding-top:54px; }
      .topbar.admin-offset { top:28px; }
      .content { padding:1rem .9rem 3rem; }
      .form-grid { grid-template-columns:1fr; }
      .form-group.full { grid-column:1; }
      .detail-grid { grid-template-columns:1fr; }
      .members-grid { grid-template-columns:1fr 1fr; }
    }
    @media(max-width:420px) {
      .members-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<div class="admin-bar" id="adminBar">
  🔐 ADMIN MODE <span>Full access enabled</span>
</div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand" onclick="window.location.href='index.html'">
    <div class="brand-logos">
      <div class="brand-logo"><img src="gecc-logo.jpg" alt="GECC"/></div>
      <div class="brand-logo"><img src="uniport-logo.jpg" alt="Uniport"/></div>
    </div>
    <div class="brand-text">
      <span class="brand-name">GECC Uniport</span>
      <span class="brand-sub">Member Portal</span>
    </div>
  </div>
  <nav class="nav-section">
    <div class="nav-label">Menu</div>
    <a id="navMemo" class="nav-item" href="memo.html" style="display:none"><span class="icon">⚙️</span> Memo</a>
    <a class="nav-item" href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
    <a class="nav-item active" href="members.html"><span class="icon">👥</span> Members</a>
    <a class="nav-item" href="past-members.html"><span class="icon">📜</span> Past Members</a>
    <a class="nav-item" href="attendance.html"><span class="icon">✓</span> Attendance</a>
    <a class="nav-item" href="events.html"><span class="icon">📅</span> Events</a>
    <a class="nav-item" href="positions.html"><span class="icon">🎯</span> Positions</a>
  </nav>
  <div class="nav-bottom">
    <button class="btn-logout" onclick="doLogout()">🚪 Logout</button>
  </div>
</aside>

<div class="topbar" id="topbar">
  <div class="topbar-brand" onclick="window.location.href='index.html'">
    <div class="brand-logos">
      <div class="brand-logo"><img src="gecc-logo.jpg" alt="GECC"/></div>
      <div class="brand-logo"><img src="uniport-logo.jpg" alt="Uniport"/></div>
    </div>
    &nbsp;GECC Uniport
  </div>
  <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
</div>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="main" id="mainWrap">
  <div class="main-bar"></div>
  <div class="content">

    <div class="page-header">
      <h1>👥 Members</h1>
      <div class="header-actions">
        <button class="btn-outline" id="btnExport" onclick="exportCSV()" style="display:none">⬇ Export CSV</button>
        <button class="btn-primary" id="btnAdd" onclick="openAddModal()" style="display:none">+ Add Member</button>
      </div>
    </div>

    <div class="members-stats">
      <div class="mstat"><div class="mstat-val" id="msTotal">0</div><div class="mstat-label">Total Active</div></div>
      <div class="mstat"><div class="mstat-val" id="msFinal">0</div><div class="mstat-label">Final Year</div></div>
      <div class="mstat"><div class="mstat-val" id="msLeaders">0</div><div class="mstat-label">Leaders</div></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search by name or department…" oninput="renderMembers()" />
      </div>
      <div class="filter-btns">
        <button class="filter-btn active" data-filter="all" onclick="setFilter(this)">All</button>
        <button class="filter-btn" data-filter="fyb" onclick="setFilter(this)">🎓 Final Year</button>
      </div>
    </div>

    <div class="members-grid" id="membersGrid"></div>

  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Member Details</div>
      <button class="modal-close" onclick="closeDetail()">×</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer" id="detailFooter"></div>
  </div>
</div>

<!-- Add Member Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add New Member</div>
      <button class="modal-close" onclick="closeAdd()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">

        <div class="form-group full">
          <label>Full Name *</label>
          <input type="text" id="fName" placeholder="e.g. Chukwuemeka Eze" />
          <span class="field-err" id="fNameErr">Name is required</span>
        </div>

        <div class="form-group">
          <label>Gender *</label>
          <div class="select-wrap">
            <select id="fGender">
              <option value="">— Select —</option>
              <option>Male</option>
              <option>Female</option>
            </select>
          </div>
          <span class="field-err" id="fGenderErr">Required</span>
        </div>

        <div class="form-group">
          <label>Level *</label>
          <div class="select-wrap">
            <select id="fLevel">
              <option value="">— Select —</option>
              <option>100L</option><option>200L</option><option>300L</option>
              <option>400L</option><option>500L</option><option>600L</option><option>700L</option>
            </select>
          </div>
          <span class="field-err" id="fLevelErr">Required</span>
        </div>

        <div class="form-group">
          <label>Department *</label>
          <input type="text" id="fDept" placeholder="e.g. Computer Science" />
          <span class="field-err" id="fDeptErr">Required</span>
        </div>

        <div class="form-group">
          <label>Faculty</label>
          <div class="select-wrap">
            <select id="fFaculty">
              <option value="">— Select —</option>
              <option>Agriculture</option>
              <option>Allied Health Sciences</option>
              <option>Basic Medical Sciences</option>
              <option>Clinical Sciences</option>
              <option>Communication &amp; Media Studies</option>
              <option>Computing</option>
              <option>Dentistry</option>
              <option>Education</option>
              <option>Engineering</option>
              <option>Humanities</option>
              <option>Law</option>
              <option>Management Sciences</option>
              <option>Pharmaceutical Sciences</option>
              <option>Science</option>
              <option>SSLT</option>
              <option>Social Sciences</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="fPhone" placeholder="08012345678" />
        </div>

        <div class="form-group">
          <label>State of Origin</label>
          <div class="select-wrap">
            <select id="fState">
              <option value="">— Select —</option>
              <option>Abia</option><option>Adamawa</option><option>Akwa Ibom</option><option>Anambra</option>
              <option>Bauchi</option><option>Bayelsa</option><option>Benue</option><option>Borno</option>
              <option>Cross River</option><option>Delta</option><option>Ebonyi</option><option>Edo</option>
              <option>Ekiti</option><option>Enugu</option><option>FCT</option><option>Gombe</option>
              <option>Imo</option><option>Jigawa</option><option>Kaduna</option><option>Kano</option>
              <option>Katsina</option><option>Kebbi</option><option>Kogi</option><option>Kwara</option>
              <option>Lagos</option><option>Nasarawa</option><option>Niger</option><option>Ogun</option>
              <option>Ondo</option><option>Osun</option><option>Oyo</option><option>Plateau</option>
              <option>Rivers</option><option>Sokoto</option><option>Taraba</option><option>Yobe</option>
              <option>Zamfara</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Position</label>
          <div class="select-wrap">
            <select id="fPosition">
              <option value="Member">Member</option>
              <option>President</option><option>Vice President</option>
              <option>General Secretary</option><option>Asst. General Secretary</option>
              <option>Bible Study Secretary</option><option>Asst Bible Study Secretary</option>
              <option>Evangelism Secretary</option><option>Follow up Secretary</option>
              <option>Prayer Secretary</option><option>Asst Prayer Secretary</option>
              <option>Media/Publicity Secretary</option><option>Asst Media/Publicity Secretary</option>
              <option>Organizing Secretary</option><option>Asst Organizing Secretary</option>
              <option>Welfare Secretary</option><option>Asst. Welfare Secretary</option>
              <option>Academic/Magazine Secretary</option><option>Music Director</option>
              <option>Financial Secretary</option><option>Treasurer</option>
              <option>Ex-official</option><option>Associates</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Year Started *</label>
          <input type="number" id="fYearStart" placeholder="e.g. 2023" min="2000" max="2099" />
          <span class="field-err" id="fYearStartErr">Required</span>
        </div>

        <div class="form-group">
          <label>Year Leaving</label>
          <input type="number" id="fYearLeave" placeholder="e.g. 2027" min="2000" max="2099" />
        </div>

        <div class="form-group full">
          <label>Date of Birth (optional)</label>
          <div class="dob-row">
            <div class="select-wrap">
              <select id="fDobDay" placeholder="Day" />
              <option>Day</option>
              <option>1</option>
              <option>2</option>
              <option>3</option>
              <option>4</option>
              <option>5</option>
              <option>6</option>    
              <option>7</option>
              <option>8</option>
              <option>9</option>
              <option>10</option>
             <option>11</option>
             <option>12</option>
             <option>13</option>
              <option>14</option>
               <option>15</option>
               <option value="16">16</option>
<option value="17">17</option>
<option value="18">18</option>
<option value="19">19</option>
<option value="20">20</option>

<script>
  const role = localStorage.getItem('userRole');
  if (!role) { window.location.href = 'auth.html'; }
  const isAdmin = role === 'admin';

  if (isAdmin) {
    document.getElementById('adminBar').classList.add('show');
    document.getElementById('sidebar').classList.add('admin-offset');
    document.getElementById('topbar').classList.add('admin-offset');
    document.getElementById('mainWrap').classList.add('admin-offset');
    document.getElementById('navMemo').style.display = 'flex';
    document.getElementById('btnAdd').style.display = 'flex';
    document.getElementById('btnExport').style.display = 'flex';
  }

  // ... (keep all your constants: POSITION_COLORS, ALL_POSITIONS, LEADERS, etc.)

  let allMembers = [];
  let currentFilter = 'all';
  let editingId = null;
  let memoData = {};

  function avatarColor(name) { /* keep your existing function */ }
  function initials(name) { return name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }

  function isFYB(m) {
    return m.yearLeaving && parseInt(m.yearLeaving) === currentYear;
  }

  function shouldGraduate(m) {
    if (!m.yearLeaving || m.position === 'Associates') return false;
    const leavingYear = parseInt(m.yearLeaving);

    if (leavingYear < currentYear) return true;
    if (leavingYear === currentYear) {
      if (!memoData || memoData.semester !== '2nd' || !memoData.endDate) return false;
      const semEnd = new Date(memoData.endDate);
      return new Date() > semEnd;
    }
    return false;
  }

  // ====================== FIXED AUTO-GRADUATION ======================
  async function autoGraduate() {
    const toGraduate = allMembers.filter(m => shouldGraduate(m));

    for (const m of toGraduate) {
      try {
        // Check if already exists in past-members (prevent duplicates)
        const existing = await db.collection('past-members')
          .where('name', '==', m.name)
          .where('yearLeaving', '==', m.yearLeaving)
          .get();

        if (!existing.empty) {
          // Already moved → just delete from active
          await db.collection('members').doc(m.id).delete();
          continue;
        }

        const history = m.associateHistory || [{
          position: m.position || 'Member',
          yearStarted: m.yearStarted || '',
          yearLeft: m.yearLeaving || ''
        }];

        await db.collection('past-members').add({
          ...m,
          position: 'Associates',
          associateHistory: history,
          movedAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        await db.collection('members').doc(m.id).delete();
        console.log(`✅ Graduated: ${m.name}`);

      } catch (err) {
        console.error(`Failed to graduate ${m.name}:`, err);
      }
    }
  }

  // Load memo then members
  db.collection('settings').doc('memo').get().then(snap => {
    memoData = snap.exists ? snap.data() : {};

    db.collection('members').onSnapshot(snap => {
      allMembers = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      // Run graduation only once per snapshot
      autoGraduate();

      filterRender();
    });
  });

  // Rest of your functions (filterRender, setFilter, openDetail, etc.) remain the same
