<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GECC Uniport — Past Members</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue:#0066cc; --green:#28a745; --red:#dc3545; --brown:#8B6F47; --sidebar-w:240px; }
    html, body { height:100%; font-family:'Open Sans',sans-serif; background:#f7f9fc; color:#1a1a1a; }

    .admin-bar { display:none; position:fixed; top:0; left:0; right:0; height:28px; background:#0066cc; align-items:center; justify-content:center; font-size:.72rem; font-weight:700; color:#fff; letter-spacing:.08em; text-transform:uppercase; z-index:200; }
    .admin-bar.show { display:flex; }
    .admin-bar span { opacity:.7; font-weight:400; margin-left:.5rem; text-transform:none; letter-spacing:0; }

    .sidebar { position:fixed; top:0; left:0; width:var(--sidebar-w); height:100vh; background:#fff; border-right:1px solid #dde3ec; display:flex; flex-direction:column; z-index:100; transition:transform .3s; }
    .sidebar.admin-offset { top:28px; height:calc(100vh - 28px); }
    .sidebar-brand { display:flex; align-items:center; gap:.7rem; padding:1rem 1.1rem; border-bottom:1px solid #dde3ec; cursor:pointer; }
    .brand-logos { display:flex; align-items:center; gap:.3rem; }
    .brand-logo { width:30px; height:30px; border-radius:50%; overflow:hidden; border:1px solid #dde3ec; }
    .brand-logo img { width:100%; height:100%; object-fit:contain; }
    .brand-text { display:flex; flex-direction:column; line-height:1.25; }
    .brand-name { font-family:'Merriweather',serif; font-size:.75rem; font-weight:700; color:#0066cc; }
    .brand-sub { font-size:.6rem; color:#999; letter-spacing:.06em; text-transform:uppercase; }
    .nav-section { flex:1; overflow-y:auto; padding:.6rem 0; }
    .nav-label { font-size:.6rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#aaa; padding:.6rem 1.1rem .25rem; }
    .nav-item { display:flex; align-items:center; gap:.65rem; padding:.6rem 1.1rem; color:#555; font-size:.85rem; font-weight:600; text-decoration:none; border-left:3px solid transparent; transition:color .2s,background .2s,border-color .2s; }
    .nav-item:hover { color:#0066cc; background:#f0f5ff; }
    .nav-item.active { color:#0066cc; background:#eef4ff; border-left-color:#0066cc; }
    .nav-item .icon { width:18px; text-align:center; font-size:.95rem; }
    .nav-bottom { border-top:1px solid #dde3ec; padding:.5rem 0; }
    .btn-logout { display:flex; align-items:center; gap:.65rem; padding:.6rem 1.1rem; width:100%; background:none; border:none; color:#dc3545; font-family:'Open Sans',sans-serif; font-size:.85rem; font-weight:700; cursor:pointer; transition:background .2s; }
    .btn-logout:hover { background:#fff5f5; }

    .topbar { display:none; position:fixed; top:0; left:0; right:0; height:54px; background:#fff; border-bottom:1px solid #dde3ec; align-items:center; justify-content:space-between; padding:0 1rem; z-index:99; }
    .topbar.admin-offset { top:28px; }
    .topbar-brand { display:flex; align-items:center; gap:.5rem; font-family:'Merriweather',serif; font-size:.8rem; font-weight:700; color:#0066cc; cursor:pointer; }
    .topbar-brand .brand-logo { width:26px; height:26px; }
    .hamburger { background:none; border:none; cursor:pointer; color:#555; padding:.3rem; display:flex; flex-direction:column; gap:5px; }
    .hamburger span { display:block; width:22px; height:2px; background:currentColor; border-radius:2px; }
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:98; }
    .overlay.show { display:block; }

    .main { margin-left:var(--sidebar-w); min-height:100vh; }
    .main.admin-offset { margin-top:28px; }
    .main-bar { height:4px; background:#8B6F47; }
    .content { padding:1.8rem; }

    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.4rem; flex-wrap:wrap; gap:.8rem; }
    .page-header h1 { font-family:'Merriweather',serif; font-size:1.2rem; font-weight:700; }
    .btn-outline { display:inline-flex; align-items:center; gap:.4rem; padding:.6rem 1.1rem; background:transparent; color:#8B6F47; font-family:'Open Sans',sans-serif; font-size:.82rem; font-weight:700; border:1.5px solid #8B6F47; border-radius:5px; cursor:pointer; transition:background .2s; }
    .btn-outline:hover { background:#f5f0ea; }

    .stats-row { display:flex; gap:1rem; margin-bottom:1.4rem; flex-wrap:wrap; }
    .pstat { background:#fff; border:1px solid #dde3ec; border-radius:8px; padding:.8rem 1.1rem; flex:1; min-width:100px; box-shadow:0 1px 4px rgba(0,0,0,.04); }
    .pstat-val { font-size:1.5rem; font-weight:700; color:#8B6F47; line-height:1; }
    .pstat-label { font-size:.68rem; color:#999; font-weight:700; text-transform:uppercase; letter-spacing:.06em; margin-top:.2rem; }

    .toolbar { display:flex; align-items:center; gap:.7rem; margin-bottom:1.2rem; }
    .search-wrap { position:relative; flex:1; min-width:200px; }
    .search-wrap input { width:100%; padding:.65rem .9rem .65rem 2.2rem; border:1.5px solid #ccd4df; border-radius:5px; font-family:'Open Sans',sans-serif; font-size:.88rem; color:#1a1a1a; outline:none; transition:border-color .2s; }
    .search-wrap input:focus { border-color:#8B6F47; }
    .search-icon { position:absolute; left:.7rem; top:50%; transform:translateY(-50%); color:#aaa; }

    .members-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:1rem; }
    .member-card { background:#fff; border:1px solid #dde3ec; border-radius:8px; padding:1.1rem; cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,.04); transition:box-shadow .2s,border-color .2s; }
    .member-card:hover { box-shadow:0 4px 12px rgba(0,0,0,.1); border-color:#c4a882; }
    .member-card-top { display:flex; align-items:center; gap:.75rem; margin-bottom:.75rem; }
    .member-avatar { width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1rem; font-weight:700; color:#fff; flex-shrink:0; background:#8B6F47; }
    .member-card-name { font-size:.9rem; font-weight:700; color:#1a1a1a; }
    .member-card-pos { font-size:.72rem; font-weight:700; color:#8B6F47; margin-top:.1rem; }
    .member-card-info { display:flex; flex-direction:column; gap:.28rem; }
    .member-card-row { display:flex; align-items:center; gap:.4rem; font-size:.76rem; color:#666; }
    .member-card-row .lbl { color:#aaa; font-size:.68rem; font-weight:700; text-transform:uppercase; min-width:44px; }

    .empty-state { text-align:center; padding:3rem 1rem; color:#bbb; grid-column:1/-1; }
    .empty-state .big { font-size:2.5rem; margin-bottom:.6rem; }

    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:500; align-items:center; justify-content:center; padding:1rem; }
    .modal-overlay.show { display:flex; }
    .modal { background:#fff; border-radius:8px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,.15); }
    .modal-header { display:flex; align-items:center; justify-content:space-between; padding:1.2rem 1.4rem; border-bottom:1px solid #edf0f4; }
    .modal-title { font-family:'Merriweather',serif; font-size:1rem; font-weight:700; color:#8B6F47; }
    .modal-close { background:none; border:none; font-size:1.6rem; cursor:pointer; color:#888; line-height:1; }
    .modal-body { padding:1.4rem; }
    .modal-footer { padding:1rem 1.4rem; border-top:1px solid #edf0f4; display:flex; justify-content:flex-end; gap:.6rem; }
    .btn-secondary { padding:.6rem 1.1rem; background:transparent; color:#555; font-family:'Open Sans',sans-serif; font-size:.82rem; font-weight:700; border:1.5px solid #ccd4df; border-radius:5px; cursor:pointer; }
    .btn-danger { padding:.6rem 1.1rem; background:#dc3545; color:#fff; font-family:'Open Sans',sans-serif; font-size:.82rem; font-weight:700; border:none; border-radius:5px; cursor:pointer; transition:background .2s; }
    .btn-danger:hover { background:#b02a37; }

    .detail-top { display:flex; align-items:center; gap:1rem; margin-bottom:1.4rem; }
    .detail-avatar { width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.5rem; font-weight:700; color:#fff; background:#8B6F47; flex-shrink:0; }
    .detail-name { font-size:1.1rem; font-weight:700; }
    .detail-pos { font-size:.8rem; font-weight:700; color:#8B6F47; margin-top:.2rem; }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:.7rem .9rem; margin-bottom:1rem; }
    .detail-field { display:flex; flex-direction:column; gap:.2rem; }
    .detail-field .lbl { font-size:.65rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#aaa; }
    .detail-field .val { font-size:.88rem; color:#1a1a1a; font-weight:600; }
    .service-badge { display:inline-block; background:#f5f0ea; color:#8B6F47; border:1px solid #c4a882; border-radius:20px; font-size:.72rem; font-weight:700; padding:.25rem .7rem; margin-top:.5rem; }

    .timeline { margin-top:1rem; padding-top:1rem; border-top:1px solid #edf0f4; }
    .timeline-title { font-size:.7rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#aaa; margin-bottom:.8rem; }
    .timeline-item { display:flex; align-items:flex-start; gap:.75rem; padding:.5rem 0; border-bottom:1px solid #f5f5f5; }
    .timeline-item:last-child { border-bottom:none; }
    .timeline-dot { width:10px; height:10px; border-radius:50%; background:#8B6F47; flex-shrink:0; margin-top:.25rem; }
    .timeline-label { font-size:.82rem; font-weight:700; color:#1a1a1a; }
    .timeline-years { font-size:.75rem; color:#888; margin-top:.1rem; }

    .toast { position:fixed; bottom:1.5rem; right:1.5rem; padding:.8rem 1.3rem; border-radius:6px; font-size:.85rem; font-weight:700; color:#fff; z-index:999; transform:translateY(12px); opacity:0; transition:opacity .3s,transform .3s; pointer-events:none; }
    .toast.show { opacity:1; transform:translateY(0); }
    .toast.success { background:#28a745; }
    .toast.error { background:#dc3545; }

    @media(max-width:768px) {
      .sidebar { transform:translateX(-100%); }
      .sidebar.open { transform:translateX(0); }
      .topbar { display:flex; }
      .main { margin-left:0; padding-top:54px; }
      .main.admin-offset { margin-top:28px; padding-top:54px; }
      .topbar.admin-offset { top:28px; }
      .content { padding:1rem .9rem 3rem; }
      .members-grid { grid-template-columns:1fr 1fr; }
      .detail-grid { grid-template-columns:1fr; }
    }
    @media(max-width:420px) { .members-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<div class="admin-bar" id="adminBar">🔐 ADMIN MODE <span>Full access enabled</span></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand" onclick="window.location.href='index.html'">
    <div class="brand-logos">
      <div class="brand-logo"><img src="gecc-logo.jpg" alt="GECC"/></div>
      <div class="brand-logo"><img src="uniport-logo.jpg" alt="Uniport"/></div>
    </div>
    <div class="brand-text">
      <span class="brand-name">GECC Uniport</span>
      <span class="brand-sub">Member Portal</span>
    </div>
  </div>
  <nav class="nav-section">
    <div class="nav-label">Menu</div>
    <a id="navMemo" class="nav-item" href="memo.html" style="display:none"><span class="icon">⚙️</span> Memo</a>
    <a class="nav-item" href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
    <a class="nav-item" href="members.html"><span class="icon">👥</span> Members</a>
    <a class="nav-item active" href="past-members.html"><span class="icon">📜</span> Past Members</a>
    <a class="nav-item" href="attendance.html"><span class="icon">✓</span> Attendance</a>
    <a class="nav-item" href="events.html"><span class="icon">📅</span> Events</a>
    <a class="nav-item" href="positions.html"><span class="icon">🎯</span> Positions</a>
  </nav>
  <div class="nav-bottom">
    <button class="btn-logout" onclick="doLogout()">🚪 Logout</button>
  </div>
</aside>

<div class="topbar" id="topbar">
  <div class="topbar-brand" onclick="window.location.href='index.html'">
    <div class="brand-logos">
      <div class="brand-logo"><img src="gecc-logo.jpg" alt="GECC"/></div>
      <div class="brand-logo"><img src="uniport-logo.jpg" alt="Uniport"/></div>
    </div>
    &nbsp;GECC Uniport
  </div>
  <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
</div>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="main" id="mainWrap">
  <div class="main-bar"></div>
  <div class="content">

    <div class="page-header">
      <h1>📜 Past Members</h1>
      <button class="btn-outline" id="btnExport" onclick="exportCSV()" style="display:none">⬇ Export CSV</button>
    </div>

    <div class="stats-row">
      <div class="pstat"><div class="pstat-val" id="psTotal">0</div><div class="pstat-label">Total Associates</div></div>
      <div class="pstat"><div class="pstat-val" id="psLeaders">0</div><div class="pstat-label">Held Leadership</div></div>
      <div class="pstat"><div class="pstat-val" id="psAvg">0</div><div class="pstat-label">Avg Service Yrs</div></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search by name or department…" oninput="renderMembers()" />
      </div>
    </div>

    <div class="members-grid" id="membersGrid">
      <div class="empty-state"><div class="big">⏳</div><p>Loading…</p></div>
    </div>

  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Associate Profile</div>
      <button class="modal-close" onclick="closeDetail()">×</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer" id="detailFooter">
      <button class="btn-secondary" onclick="closeDetail()">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const role = localStorage.getItem('userRole');
  if (!role) { window.location.href = 'auth.html'; }
  const isAdmin = role === 'admin';

  if (isAdmin) {
    document.getElementById('adminBar').classList.add('show');
    document.getElementById('sidebar').classList.add('admin-offset');
    document.getElementById('topbar').classList.add('admin-offset');
    document.getElementById('mainWrap').classList.add('admin-offset');
    document.getElementById('navMemo').style.display = 'flex';
    document.getElementById('btnExport').style.display = 'flex';
  }

  const LEADERS = ['President','Vice President','General Secretary','Asst. General Secretary',
    'Bible Study Secretary','Asst Bible Study Secretary','Evangelism Secretary','Follow up Secretary',
    'Prayer Secretary','Asst Prayer Secretary','Media/Publicity Secretary','Asst Media/Publicity Secretary',
    'Organizing Secretary','Asst Organizing Secretary','Welfare Secretary','Asst. Welfare Secretary',
    'Academic/Magazine Secretary','Music Director','Financial Secretary','Treasurer'];

  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function initials(name) { return name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }

  let allAssociates = [];

  // Load from past-members Firestore collection — real-time
  db.collection('past-members').orderBy('name').onSnapshot(snap => {
    allAssociates = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    renderMembers();
  }, err => {
    // orderBy may fail if no index — fallback without ordering
    db.collection('past-members').onSnapshot(snap => {
      allAssociates = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      allAssociates.sort((a,b) => (a.name||'').localeCompare(b.name||''));
      renderMembers();
    });
  });

  function renderMembers() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allAssociates
      .filter(m => !q || m.name.toLowerCase().includes(q) || (m.department||'').toLowerCase().includes(q));

    // Stats
    document.getElementById('psTotal').textContent = allAssociates.length;

    const heldLeadershipCount = allAssociates.filter(m => {
      const history = m.associateHistory || [];
      return history.some(h => LEADERS.includes(h.position));
    }).length;
    document.getElementById('psLeaders').textContent = heldLeadershipCount;

    const avgYears = allAssociates.length
      ? (allAssociates.reduce((s,m) => {
          const yrs = m.yearLeaving && m.yearStarted
            ? Math.max(0, parseInt(m.yearLeaving) - parseInt(m.yearStarted)) : 0;
          return s + yrs;
        }, 0) / allAssociates.length).toFixed(1)
      : 0;
    document.getElementById('psAvg').textContent = avgYears;

    const grid = document.getElementById('membersGrid');
    if (!filtered.length) {
      grid.innerHTML = `<div class="empty-state"><div class="big">📜</div><p>${q?'No associates match your search.':'No past members yet.'}</p></div>`;
      return;
    }

    grid.innerHTML = filtered.map(m => {
      const history = m.associateHistory || [];
      const heldLeader = history.some(h => LEADERS.includes(h.position));
      return `
        <div class="member-card" onclick="openDetail('${m.id}')">
          <div class="member-card-top">
            <div class="member-avatar">${initials(m.name)}</div>
            <div>
              <div class="member-card-name">${m.name}</div>
              <div class="member-card-pos">Associate${heldLeader?' · ⭐':''}</div>
            </div>
          </div>
          <div class="member-card-info">
            <div class="member-card-row"><span class="lbl">Dept</span>${m.department||'—'}</div>
            <div class="member-card-row"><span class="lbl">Served</span>${m.yearStarted||'?'} – ${m.yearLeaving||'?'}</div>
            ${history.length ? `<div class="member-card-row"><span class="lbl">Roles</span>${history.length} position${history.length!==1?'s':''}</div>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  function openDetail(id) {
    const m = allAssociates.find(x=>x.id===id);
    if (!m) return;

    const history = m.associateHistory || [];
    const heldLeader = history.some(h => LEADERS.includes(h.position));
    const yrs = m.yearLeaving && m.yearStarted
      ? Math.max(0, parseInt(m.yearLeaving) - parseInt(m.yearStarted)) : null;
    const dobStr = m.dob_day && m.dob_month
      ? `${m.dob_day} ${MONTHS[parseInt(m.dob_month)-1]}${m.dob_year?' '+m.dob_year:''}`
      : '—';

    const timelineHtml = history.length
      ? history.map(h => `
          <div class="timeline-item">
            <div class="timeline-dot"></div>
            <div>
              <div class="timeline-label">${h.position}</div>
              <div class="timeline-years">${h.yearStarted||'?'} – ${h.yearLeft||'?'}</div>
            </div>
          </div>`).join('')
      : `<div class="timeline-item">
           <div class="timeline-dot"></div>
           <div>
             <div class="timeline-label">Member</div>
             <div class="timeline-years">${m.yearStarted||'?'} – ${m.yearLeaving||'?'}</div>
           </div>
         </div>`;

    document.getElementById('detailBody').innerHTML = `
      <div class="detail-top">
        <div class="detail-avatar">${initials(m.name)}</div>
        <div>
          <div class="detail-name">${m.name}</div>
          <div class="detail-pos">Associate Member</div>
          ${yrs!==null?`<div class="service-badge">⏱ ${yrs} year${yrs!==1?'s':''} of service</div>`:''}
        </div>
      </div>
      <div class="detail-grid">
        <div class="detail-field"><span class="lbl">Gender</span><span class="val">${m.gender||'—'}</span></div>
        <div class="detail-field"><span class="lbl">Department</span><span class="val">${m.department||'—'}</span></div>
        <div class="detail-field"><span class="lbl">Faculty</span><span class="val">${m.faculty||'—'}</span></div>
        <div class="detail-field"><span class="lbl">State</span><span class="val">${m.state||'—'}</span></div>
        <div class="detail-field"><span class="lbl">Phone</span><span class="val">${m.phone||'—'}</span></div>
        <div class="detail-field"><span class="lbl">Date of Birth</span><span class="val">${dobStr}</span></div>
        <div class="detail-field"><span class="lbl">Year Started</span><span class="val">${m.yearStarted||'—'}</span></div>
        <div class="detail-field"><span class="lbl">Year Left</span><span class="val">${m.yearLeaving||'—'}</span></div>
        <div class="detail-field"><span class="lbl">Leadership</span><span class="val">${heldLeader?'⭐ Yes':'No'}</span></div>
        <div class="detail-field"><span class="lbl">Roles</span><span class="val">${history.length} position${history.length!==1?'s':''}</span></div>
      </div>
      <div class="timeline">
        <div class="timeline-title">📋 Positions &amp; Years Served</div>
        ${timelineHtml}
      </div>`;

    document.getElementById('detailFooter').innerHTML = isAdmin
      ? `<button class="btn-secondary" onclick="closeDetail()">Close</button>
         <button class="btn-danger" onclick="deleteAssociate('${m.id}')">🗑 Delete</button>`
      : `<button class="btn-secondary" onclick="closeDetail()">Close</button>`;

    document.getElementById('detailModal').classList.add('show');
  }

  function closeDetail() { document.getElementById('detailModal').classList.remove('show'); }

  function deleteAssociate(id) {
    if (!confirm('Permanently delete this past member? This cannot be undone.')) return;
    db.collection('past-members').doc(id).delete()
      .then(()=>{ closeDetail(); showToast('Past member deleted.','success'); })
      .catch(err=>showToast('Error: '+err.message,'error'));
  }

  function exportCSV() {
    const headers = ['Name','Gender','Department','Faculty','State','Phone','Year Started','Year Left','Positions Held'];
    const rows = allAssociates.map(m => {
      const history = m.associateHistory || [];
      const positions = history.map(h=>h.position+(h.yearStarted?' ('+h.yearStarted+'–'+(h.yearLeft||'?')+')':'')).join(' | ');
      return [m.name,m.gender,m.department,m.faculty,m.state,m.phone,m.yearStarted,m.yearLeaving,positions]
        .map(v=>`"${v||''}"`).join(',');
    });
    const csv = [headers.join(','),...rows].join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download = 'gecc-associates.csv'; a.click();
  }

  function showToast(msg,type) {
    const t=document.getElementById('toast');
    t.textContent=msg; t.className='toast show '+type;
    setTimeout(()=>t.className='toast',2500);
  }
  function doLogout() { localStorage.removeItem('userRole'); window.location.href='auth.html'; }
  const sidebar=document.getElementById('sidebar'), overlay=document.getElementById('overlay');
  document.getElementById('hamburger').addEventListener('click',()=>{sidebar.classList.toggle('open');overlay.classList.toggle('show');});
  function closeSidebar(){sidebar.classList.remove('open');overlay.classList.remove('show');}
  document.getElementById('detailModal').addEventListener('click',function(e){if(e.target===this)closeDetail();});
</script>
</body>
