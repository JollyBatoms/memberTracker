<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GECC Uniport — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height:100%; font-family:'Open Sans',sans-serif; background:#f7f9fc; color:#1a1a1a; }
    .header-bar { background:#0066cc; height:8px; width:100%; }
    .page { min-height:calc(100vh - 8px); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem 1.25rem; }
    .card { background:#fff; border:1px solid #dde3ec; border-radius:8px; padding:2.5rem 2rem; width:100%; max-width:400px; box-shadow:0 2px 16px rgba(0,0,0,.08); }
    .card-header { display:flex; flex-direction:column; align-items:center; text-align:center; margin-bottom:2rem; }
    .logos { display:flex; align-items:center; justify-content:center; gap:1rem; margin-bottom:1rem; }
    .logo-img { width:60px; height:60px; object-fit:contain; }
    .logo-divider { width:1px; height:44px; background:#dde3ec; }
    .card-title { font-family:'Merriweather',serif; font-size:1.05rem; font-weight:700; color:#0066cc; margin-bottom:.25rem; }
    .card-sub { font-size:.75rem; color:#888; letter-spacing:.08em; text-transform:uppercase; }
    .form-group { margin-bottom:1.1rem; }
    .form-group label { display:block; font-size:.78rem; font-weight:700; color:#444; margin-bottom:.4rem; }
    .input-wrap { position:relative; }
    input[type="email"], input[type="password"] {
      width:100%; padding:.78rem 2.8rem .78rem .9rem;
      border:1.5px solid #ccd4df; border-radius:5px;
      font-family:'Open Sans',sans-serif; font-size:.92rem; outline:none;
    }
    input:focus { border-color:#0066cc; box-shadow:0 0 0 3px rgba(0,102,204,.1); }
    .feedback { display:none; padding:.65rem .9rem; border-radius:5px; font-size:.82rem; font-weight:600; margin-bottom:1.1rem; text-align:center; }
    .feedback.show { display:block; }
    .feedback.success { background:#eaf7ee; border:1px solid #b2ddbf; color:#1e7e34; }
    .feedback.error   { background:#fdf0f1; border:1px solid #f0b8bc; color:#c0392b; }
    .btn-login { width:100%; padding:.85rem; background:#0066cc; color:#fff; font-weight:700; border:none; border-radius:5px; cursor:pointer; }
    .btn-back { display:block; width:100%; padding:.75rem; margin-top:0.7rem; background:transparent; color:#666; font-size:.82rem; font-weight:600; text-align:center; border:1.5px solid #ccd4df; border-radius:5px; text-decoration:none; }
  </style>
</head>
<body>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<div class="header-bar"></div>
<div class="page">
  <div class="card">
    <div class="card-header">
      <div class="logos">
        <img class="logo-img" src="gecc-logo.jpg" alt="GECC"/>
        <div class="logo-divider"></div>
        <img class="logo-img" src="uniport-logo.jpg" alt="Uniport"/>
      </div>
      <div class="card-title">Member Portal</div>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="fEmail" placeholder="your@email.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="fPass" placeholder="Enter password"/>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>
    <a href="index.html" class="btn-back">← Back to Home</a>
  </div>
</div>

<script>
  auth.onAuthStateChanged(user => {
    if (user) window.location.href = 'dashboard.html';
  });

  function showFeedback(msg, type) {
    const fb = document.getElementById('feedback');
    fb.textContent = msg;
    fb.className = 'feedback show ' + type;
  }

  function doLogin() {
    const email = document.getElementById('fEmail').value.trim();
    const pass  = document.getElementById('fPass').value;
    const btn   = document.getElementById('loginBtn');

    if (!email || !pass) { showFeedback('Enter email and password.', 'error'); return; }

    btn.disabled = true;
    btn.textContent = 'Signing in…';

    auth.signInWithEmailAndPassword(email, pass)
      .then(cred => {
        // Query the database for the user's role document
        return db.collection('users').doc(cred.user.uid).get();
      })
      .then(doc => {
        if (!doc.exists) throw new Error("No database profile found.");
        localStorage.setItem('userRole', doc.data().role);
        window.location.href = 'dashboard.html';
      })
      .catch(err => {
        showFeedback('Sign In Error: ' + err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      });
  }
</script>
</body>
</html>
