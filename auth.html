<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GECC Uniport — Sign In</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height:100%; font-family:'Open Sans',sans-serif; background:#f7f9fc; color:#1a1a1a; }
    .header-bar { background:#0066cc; height:8px; width:100%; }
    .page { min-height:calc(100vh - 8px); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem 1.25rem; }
    .card { background:#fff; border:1px solid #dde3ec; border-radius:8px; padding:2.5rem 2rem; width:100%; max-width:400px; box-shadow:0 2px 16px rgba(0,0,0,.08); }
    .card-header { display:flex; flex-direction:column; align-items:center; text-align:center; margin-bottom:2rem; }
    .logos { display:flex; align-items:center; justify-content:center; gap:1rem; margin-bottom:1rem; }
    .logo-img { width:60px; height:60px; object-fit:contain; }
    .logo-divider { width:1px; height:44px; background:#dde3ec; }
    .card-title { font-family:'Merriweather',serif; font-size:1.05rem; font-weight:700; color:#0066cc; margin-bottom:.25rem; }
    .card-sub { font-size:.75rem; color:#888; letter-spacing:.08em; text-transform:uppercase; }

    .tab-switch { display:flex; background:#f7f9fc; border:1.5px solid #dde3ec; border-radius:6px; padding:.25rem; margin-bottom:1.5rem; gap:.25rem; }
    .tab-btn { flex:1; padding:.55rem; font-family:'Open Sans',sans-serif; font-size:.82rem; font-weight:700; border:none; border-radius:4px; cursor:pointer; background:transparent; color:#888; transition:all .2s; }
    .tab-btn.active { background:#fff; color:#0066cc; box-shadow:0 1px 4px rgba(0,0,0,.1); }

    .form-group { margin-bottom:1rem; }
    .form-group label { display:block; font-size:.78rem; font-weight:700; color:#444; margin-bottom:.4rem; }
    .input-wrap { position:relative; }
    input[type="email"], input[type="password"], input[type="text"] {
      width:100%; padding:.78rem 2.8rem .78rem .9rem;
      border:1.5px solid #ccd4df; border-radius:5px;
      font-family:'Open Sans',sans-serif; font-size:.92rem; color:#1a1a1a;
      background:#fff; outline:none; transition:border-color .2s,box-shadow .2s;
    }
    input:focus { border-color:#0066cc; box-shadow:0 0 0 3px rgba(0,102,204,.1); }
    input.invalid { border-color:#dc3545; }
    .eye-btn { position:absolute; right:.75rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#aaa; padding:0; line-height:1; }
    .eye-btn:hover { color:#555; }

    .feedback { display:none; padding:.65rem .9rem; border-radius:5px; font-size:.82rem; font-weight:600; margin-bottom:1rem; text-align:center; }
    .feedback.show { display:block; }
    .feedback.success { background:#eaf7ee; border:1px solid #b2ddbf; color:#1e7e34; }
    .feedback.error   { background:#fdf0f1; border:1px solid #f0b8bc; color:#c0392b; }
    .feedback.info    { background:#eef4ff; border:1px solid #c5d9f5; color:#0066cc; }

    .btn-main { width:100%; padding:.85rem; background:#0066cc; color:#fff; font-family:'Open Sans',sans-serif; font-size:.9rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; border:none; border-radius:5px; cursor:pointer; transition:background .2s,transform .15s; margin-bottom:.7rem; }
    .btn-main:hover { background:#0052a3; transform:translateY(-1px); }
    .btn-main:disabled { opacity:.6; cursor:not-allowed; transform:none; }
    .btn-back { display:block; width:100%; padding:.75rem; background:transparent; color:#666; font-family:'Open Sans',sans-serif; font-size:.82rem; font-weight:600; text-align:center; border:1.5px solid #ccd4df; border-radius:5px; cursor:pointer; text-decoration:none; transition:border-color .2s,color .2s; }
    .btn-back:hover { border-color:#0066cc; color:#0066cc; }

    .pending-screen { display:none; text-align:center; padding:1rem 0; }
    .pending-icon { font-size:3rem; margin-bottom:1rem; }
    .pending-title { font-family:'Merriweather',serif; font-size:1rem; font-weight:700; color:#0066cc; margin-bottom:.5rem; }
    .pending-msg { font-size:.85rem; color:#666; line-height:1.6; }

    .footer { margin-top:1.8rem; font-size:.7rem; color:#aaa; letter-spacing:.06em; text-align:center; }
  </style>
</head>
<body>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<div class="header-bar"></div>
<div class="page">
  <div class="card">

    <div class="card-header">
      <div class="logos">
        <img class="logo-img" src="gecc-logo.jpg" alt="GECC"/>
        <div class="logo-divider"></div>
        <img class="logo-img" src="uniport-logo.jpg" alt="Uniport"/>
      </div>
      <div class="card-title">Member Portal</div>
      <div class="card-sub">GECC Uniport Chapter</div>
    </div>

    <!-- Pending approval screen -->
    <div class="pending-screen" id="pendingScreen">
      <div class="pending-icon">⏳</div>
      <div class="pending-title">Registration Submitted</div>
      <div class="pending-msg">Your account is awaiting approval from the Super Admin. You will be able to log in once approved.</div>
    </div>

    <!-- Auth forms -->
    <div id="authForms">
      <div class="tab-switch">
        <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">Register</button>
      </div>

      <div class="feedback" id="feedback"></div>

      <!-- LOGIN FORM -->
      <div id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <input type="email" id="lEmail" placeholder="your@email.com" autocomplete="email"/>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <input type="password" id="lPass" placeholder="Enter your password"/>
            <button class="eye-btn" id="eyeBtn" type="button">
              <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <button class="btn-main" id="loginBtn" onclick="doLogin()">Sign In</button>
        <a href="index.html" class="btn-back">← Back to Home</a>
      </div>

      <!-- REGISTER FORM -->
      <div id="registerForm" style="display:none">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="rName" placeholder="e.g. John Doe"/>
        </div>
        <div class="form-group">
          <label>Email Address *</label>
          <input type="email" id="rEmail" placeholder="your@email.com"/>
        </div>
        <div class="form-group">
          <label>Password *</label>
          <div class="input-wrap">
            <input type="password" id="rPass" placeholder="Min. 6 characters"/>
            <button class="eye-btn" id="eyeBtn2" type="button">
              <svg id="eyeIcon2" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm Password *</label>
          <input type="password" id="rPass2" placeholder="Repeat your password"/>
        </div>
        <button class="btn-main" id="registerBtn" onclick="doRegister()">Create Account</button>
        <a href="index.html" class="btn-back">← Back to Home</a>
      </div>
    </div>

  </div>
  <div class="footer">GECC Uniport &nbsp;·&nbsp; Member Management Portal</div>
</div>

<script>
  // ── If already logged in, redirect ──
  auth.onAuthStateChanged(async user => {
    if (!user) return;
    const data = await getUserData(user.uid);
    if (!data) { await auth.signOut(); return; }
    if (data.status === 'pending') {
      document.getElementById('authForms').style.display = 'none';
      document.getElementById('pendingScreen').style.display = 'block';
      await auth.signOut();
      return;
    }
    if (data.status === 'suspended' || data.status === 'blocked') {
      await auth.signOut(); return;
    }
    setLocalStorage(user, data);
    window.location.href = 'dashboard.html';
  });

  // ── Helpers ──
  async function getUserData(uid) {
    try {
      const doc = await db.collection('users').doc(uid).get();
      return doc.exists ? doc.data() : null;
    } catch(e) { return null; }
  }

  function setLocalStorage(user, data) {
    localStorage.setItem('userRole',  data.role  || 'member');
    localStorage.setItem('userEmail', user.email);
    localStorage.setItem('userId',    user.uid);
    localStorage.setItem('userName',  data.name  || user.email);
  }

  async function notifySuperAdmin(message, type) {
    const snap = await db.collection('users').where('role','==','superadmin').limit(1).get();
    if (snap.empty) return;
    await db.collection('notifications').add({
      toUserId: snap.docs[0].id,
      message, type, read: false,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  }

  // ── Tab switch ──
  let currentTab = 'login';
  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('loginForm').style.display    = tab === 'login'    ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('tabLogin').classList.toggle('active',    tab === 'login');
    document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    document.getElementById('feedback').className = 'feedback';
  }

  // ── Eye toggle login ──
  let vis1 = false;
  document.getElementById('eyeBtn').addEventListener('click', () => {
    vis1 = !vis1;
    document.getElementById('lPass').type = vis1 ? 'text' : 'password';
    updateEye('eyeIcon', vis1);
  });
  let vis2 = false;
  document.getElementById('eyeBtn2').addEventListener('click', () => {
    vis2 = !vis2;
    document.getElementById('rPass').type = vis2 ? 'text' : 'password';
    updateEye('eyeIcon2', vis2);
  });
  function updateEye(id, show) {
    document.getElementById(id).innerHTML = show
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }

  // ── Enter key ──
  ['lEmail','lPass'].forEach(id => document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); }));
  ['rName','rEmail','rPass','rPass2'].forEach(id => document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') doRegister(); }));

  function showFeedback(msg, type) {
    const fb = document.getElementById('feedback');
    fb.textContent = msg;
    fb.className = 'feedback show ' + type;
  }

  // ── LOGIN ──
  async function doLogin() {
    const email = document.getElementById('lEmail').value.trim();
    const pass  = document.getElementById('lPass').value;
    document.getElementById('feedback').className = 'feedback';

    if (!email || !pass) { showFeedback('Please enter your email and password.', 'error'); return; }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Signing in…';

    try {
      const cred = await auth.signInWithEmailAndPassword(email, pass);
      const data = await getUserData(cred.user.uid);

      if (!data) {
        await auth.signOut();
        showFeedback('Account not found. Contact the admin.', 'error');
        btn.disabled = false; btn.textContent = 'Sign In'; return;
      }
      if (data.status === 'pending') {
        await auth.signOut();
        document.getElementById('authForms').style.display = 'none';
        document.getElementById('pendingScreen').style.display = 'block';
        return;
      }
      if (data.status === 'suspended') {
        await auth.signOut();
        showFeedback('Your account has been suspended. Contact the admin.', 'error');
        btn.disabled = false; btn.textContent = 'Sign In'; return;
      }
      if (data.status === 'blocked') {
        await auth.signOut();
        showFeedback('Your account has been blocked.', 'error');
        btn.disabled = false; btn.textContent = 'Sign In'; return;
      }

      setLocalStorage(cred.user, data);
      const label = data.role === 'superadmin' ? 'Super Admin' : data.role === 'admin' ? 'Admin' : 'Member';
      showFeedback('✓ Welcome, ' + data.name + '! Redirecting…', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 900);

    } catch(err) {
      let msg = 'Incorrect email or password.';
      if (err.code === 'auth/user-not-found')     msg = 'No account found with this email.';
      if (err.code === 'auth/wrong-password')     msg = 'Incorrect password.';
      if (err.code === 'auth/invalid-email')      msg = 'Invalid email address.';
      if (err.code === 'auth/too-many-requests')  msg = 'Too many attempts. Try again later.';
      if (err.code === 'auth/invalid-credential') msg = 'Incorrect email or password.';
      showFeedback(msg, 'error');
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  }

  // ── REGISTER ──
  async function doRegister() {
    const name  = document.getElementById('rName').value.trim();
    const email = document.getElementById('rEmail').value.trim();
    const pass  = document.getElementById('rPass').value;
    const pass2 = document.getElementById('rPass2').value;
    document.getElementById('feedback').className = 'feedback';

    if (!name)              { showFeedback('Please enter your full name.', 'error'); return; }
    if (!email)             { showFeedback('Please enter your email.', 'error'); return; }
    if (pass.length < 6)    { showFeedback('Password must be at least 6 characters.', 'error'); return; }
    if (pass !== pass2)     { showFeedback('Passwords do not match.', 'error'); return; }

    const btn = document.getElementById('registerBtn');
    btn.disabled = true; btn.textContent = 'Creating account…';

    try {
      // Create Firebase Auth account
      const cred = await auth.createUserWithEmailAndPassword(email, pass);

      // Save to Firestore — status: pending, role: member by default
      await db.collection('users').doc(cred.user.uid).set({
        name, email,
        role:      'member',
        status:    'pending',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      // Sign out immediately — must wait for approval
      await auth.signOut();

      // Notify Super Admin
      await notifySuperAdmin(name + ' registered and is awaiting approval.', 'approval');

      // Show pending screen
      document.getElementById('authForms').style.display = 'none';
      document.getElementById('pendingScreen').style.display = 'block';

    } catch(err) {
      let msg = 'Registration failed. Try again.';
      if (err.code === 'auth/email-already-in-use') msg = 'This email is already registered. Try signing in.';
      if (err.code === 'auth/invalid-email')        msg = 'Invalid email address.';
      if (err.code === 'auth/weak-password')        msg = 'Password is too weak.';
      showFeedback(msg, 'error');
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  }
</script>
</body>
  </html>
