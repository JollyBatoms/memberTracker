<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GECC Uniport — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Open Sans', sans-serif;
      background: #f7f9fc;
      color: #1a1a1a;
    }

    .header-bar { background: #0066cc; height: 8px; width: 100%; }

    .page {
      min-height: calc(100vh - 8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .card {
      background: #fff;
      border: 1px solid #dde3ec;
      border-radius: 8px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 16px rgba(0,0,0,.08);
    }

    .card-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 2rem;
    }

    .logos {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .logo-img {
      width: 60px;
      height: 60px;
      object-fit: contain;
    }
    .logo-divider {
      width: 1px;
      height: 44px;
      background: #dde3ec;
    }

    .card-title {
      font-family: 'Merriweather', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #0066cc;
      margin-bottom: .25rem;
    }
    .card-sub {
      font-size: .75rem;
      color: #888;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .field { margin-bottom: 1.2rem; }

    .field label {
      display: block;
      font-size: .78rem;
      font-weight: 700;
      color: #444;
      margin-bottom: .4rem;
      letter-spacing: .04em;
    }

    .input-wrap { position: relative; }

    input[type="password"],
    input[type="text"],
    input[type="email"] {
      width: 100%;
      padding: .78rem 2.8rem .78rem .9rem;
      border: 1.5px solid #ccd4df;
      border-radius: 5px;
      font-family: 'Open Sans', sans-serif;
      font-size: .92rem;
      color: #1a1a1a;
      background: #fff;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      border-color: #0066cc;
      box-shadow: 0 0 0 3px rgba(0,102,204,.1);
    }
    input.invalid { border-color: #dc3545; }

    .eye-btn {
      position: absolute;
      right: .75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #aaa;
      padding: 0;
      line-height: 1;
      transition: color .2s;
    }
    .eye-btn:hover { color: #555; }

    .feedback {
      display: none;
      padding: .65rem .9rem;
      border-radius: 5px;
      font-size: .82rem;
      font-weight: 600;
      margin-bottom: 1.1rem;
      text-align: center;
    }
    .feedback.show { display: block; }
    .feedback.success {
      background: #eaf7ee;
      border: 1px solid #b2ddbf;
      color: #1e7e34;
    }
    .feedback.error {
      background: #fdf0f1;
      border: 1px solid #f0b8bc;
      color: #c0392b;
    }

    .btn-login {
      width: 100%;
      padding: .85rem;
      background: #0066cc;
      color: #fff;
      font-family: 'Open Sans', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background .2s, transform .15s;
      margin-bottom: .7rem;
    }
    .btn-login:hover { background: #0052a3; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .btn-back {
      display: block;
      width: 100%;
      padding: .75rem;
      background: transparent;
      color: #666;
      font-family: 'Open Sans', sans-serif;
      font-size: .85rem;
      font-weight: 600;
      text-align: center;
      border: 1.5px solid #ccd4df;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color .2s, color .2s;
    }
    .btn-back:hover { border-color: #0066cc; color: #0066cc; }

    .role-hint {
      display: flex;
      gap: .6rem;
      margin-top: 1.6rem;
      padding-top: 1.4rem;
      border-top: 1px solid #edf0f4;
    }
    .role-pill {
      flex: 1;
      text-align: center;
      padding: .55rem .5rem;
      border-radius: 5px;
      border: 1px solid #edf0f4;
      background: #f7f9fc;
    }
    .pill-label {
      display: block;
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: .2rem;
    }
    .pill-role {
      font-size: .8rem;
      font-weight: 700;
    }
    .role-pill.admin .pill-role  { color: #0066cc; }
    .role-pill.member .pill-role { color: #28a745; }

    .footer {
      margin-top: 1.6rem;
      font-size: .7rem;
      color: #aaa;
      letter-spacing: .06em;
      text-align: center;
    }

    @media (max-width: 380px) {
      .card { padding: 2rem 1.2rem; }
    }
  </style>
</head>
<body>

<div class="header-bar"></div>

<div class="page">
  <div class="card">

    <div class="card-header">
      <div class="logos">
        <!-- Replace src with your actual logo paths -->
        <img class="logo-img" src="gecc-logo.jpg" alt="GECC Logo" />
        <div class="logo-divider"></div>
        <img class="logo-img" src="uniport-logo.jpg" alt="Uniport Logo" />
      </div>
      <div class="card-title">Member Portal</div>
      <div class="card-sub">GECC Uniport Chapter</div>
    </div>

    <!-- Feedback -->
    <div class="feedback" id="feedback"></div>

    <!-- Email -->
    <div class="field">
      <label for="email">Email</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="Enter your email" autocomplete="email" />
      </div>
    </div>

    <!-- Password -->
    <div class="field">
      <label for="pwd">Password</label>
      <div class="input-wrap">
        <input type="password" id="pwd" placeholder="Enter your password" autocomplete="current-password" />
        <button class="eye-btn" id="eyeBtn" type="button" aria-label="Show/hide password">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn">Sign In</button>
    <a href="index.html" class="btn-back">← Back to Home</a>

    <!-- Role hints -->
    <div class="role-hint">
      <div class="role-pill admin">
        <span class="pill-label">Full access</span>
        <span class="pill-role">Admin</span>
      </div>
      <div class="role-pill member">
        <span class="pill-label">View only</span>
        <span class="pill-role">Member</span>
      </div>
    </div>

  </div>

  <div class="footer">GECC Uniport &nbsp;·&nbsp; Member Management Portal</div>
</div>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── Your Firebase config ──
  const firebaseConfig = {
    apiKey: "AIzaSyCgtZvZzWdWQEJna0bJz_YhATLnnNoJRfA",
    authDomain: "gecc-uniport.firebaseapp.com",
    projectId: "gecc-uniport",
    storageBucket: "gecc-uniport.firebasestorage.app",
    messagingSenderId: "565729305146",
    appId: "1:565729305146:web:2973acd0293903725acb03"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // ── Admin emails list ──
  // Add any email you want to have admin access here
  const ADMIN_EMAILS = [
    'admin@geccuniport.com',
    // add more admin emails here if needed
  ];

  // ── If already logged in, skip to dashboard ──
  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.href = 'dashboard.html';
    }
  });

  // ── UI elements ──
  const emailInput = document.getElementById('email');
  const pwd        = document.getElementById('pwd');
  const fb         = document.getElementById('feedback');
  const loginBtn   = document.getElementById('loginBtn');
  const eyeBtn     = document.getElementById('eyeBtn');
  const eyeIcon    = document.getElementById('eyeIcon');

  // Enter key on either field triggers login
  emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  pwd.addEventListener('keydown',        e => { if (e.key === 'Enter') doLogin(); });

  // Show/hide password
  let visible = false;
  eyeBtn.addEventListener('click', () => {
    visible = !visible;
    pwd.type = visible ? 'text' : 'password';
    eyeIcon.innerHTML = visible
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  });

  function showFeedback(msg, type) {
    fb.textContent = msg;
    fb.className = 'feedback show ' + type;
  }

  function clearInvalid() {
    emailInput.classList.remove('invalid');
    pwd.classList.remove('invalid');
  }

  // ── Main login function ──
  async function doLogin() {
    clearInvalid();
    const emailVal = emailInput.value.trim();
    const pwdVal   = pwd.value;

    // Basic validation
    if (!emailVal) {
      emailInput.classList.add('invalid');
      showFeedback('Please enter your email.', 'error');
      emailInput.focus();
      return;
    }
    if (!pwdVal) {
      pwd.classList.add('invalid');
      showFeedback('Please enter your password.', 'error');
      pwd.focus();
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = 'Signing in…';

    try {
      // Sign in with Firebase Auth
      const result = await signInWithEmailAndPassword(auth, emailVal, pwdVal);
      const user   = result.user;

      // Determine role based on email
      const isAdmin = ADMIN_EMAILS.includes(user.email.toLowerCase());
      const role    = isAdmin ? 'admin' : 'member';

      // Store role in localStorage (same as your existing dashboard reads)
      localStorage.setItem('userRole', role);
      localStorage.setItem('userEmail', user.email);

      showFeedback(`✓ Logged in as ${role === 'admin' ? 'Admin' : 'Member'}. Redirecting…`, 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 900);

    } catch (err) {
      // Firebase error codes → friendly messages
      let msg = 'Incorrect email or password. Please try again.';
      if (err.code === 'auth/user-not-found')    msg = 'No account found with this email.';
      if (err.code === 'auth/wrong-password')     msg = 'Incorrect password. Please try again.';
      if (err.code === 'auth/invalid-email')      msg = 'Please enter a valid email address.';
      if (err.code === 'auth/too-many-requests')  msg = 'Too many attempts. Please try again later.';
      if (err.code === 'auth/user-disabled')      msg = 'This account has been disabled.';

      showFeedback(msg, 'error');
      pwd.value = '';
      pwd.classList.add('invalid');
      pwd.focus();
      loginBtn.disabled = false;
      loginBtn.textContent = 'Sign In';
    }
  }

  // Expose to button onclick
  loginBtn.addEventListener('click', doLogin);
</script>

</body>
</html>
