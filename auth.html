!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GECC Uniport — Sign In</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height:100%; font-family:'Open Sans',sans-serif; background:#f7f9fc; color:#1a1a1a; }

    .header-bar { background:#0066cc; height:8px; width:100%; }

    .page { min-height:calc(100vh - 8px); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem 1.25rem; }

    .card { background:#fff; border:1px solid #dde3ec; border-radius:8px; padding:2.5rem 2rem; width:100%; max-width:400px; box-shadow:0 2px 16px rgba(0,0,0,.08); }

    .card-header { display:flex; flex-direction:column; align-items:center; text-align:center; margin-bottom:2rem; }
    .logos { display:flex; align-items:center; justify-content:center; gap:1rem; margin-bottom:1rem; }
    .logo-img { width:60px; height:60px; object-fit:contain; }
    .logo-divider { width:1px; height:44px; background:#dde3ec; }
    .card-title { font-family:'Merriweather',serif; font-size:1.05rem; font-weight:700; color:#0066cc; margin-bottom:.25rem; }
    .card-sub { font-size:.75rem; color:#888; letter-spacing:.08em; text-transform:uppercase; }

    .form-group { margin-bottom:1.1rem; }
    .form-group label { display:block; font-size:.78rem; font-weight:700; color:#444; margin-bottom:.4rem; }
    .input-wrap { position:relative; }
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width:100%; padding:.78rem 2.8rem .78rem .9rem;
      border:1.5px solid #ccd4df; border-radius:5px;
      font-family:'Open Sans',sans-serif; font-size:.92rem; color:#1a1a1a;
      background:#fff; outline:none; transition:border-color .2s,box-shadow .2s;
    }
    input:focus { border-color:#0066cc; box-shadow:0 0 0 3px rgba(0,102,204,.1); }
    input.invalid { border-color:#dc3545; }

    .eye-btn { position:absolute; right:.75rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#aaa; padding:0; line-height:1; transition:color .2s; }
    .eye-btn:hover { color:#555; }

    .feedback { display:none; padding:.65rem .9rem; border-radius:5px; font-size:.82rem; font-weight:600; margin-bottom:1.1rem; text-align:center; }
    .feedback.show { display:block; }
    .feedback.success { background:#eaf7ee; border:1px solid #b2ddbf; color:#1e7e34; }
    .feedback.error   { background:#fdf0f1; border:1px solid #f0b8bc; color:#c0392b; }

    .btn-login { width:100%; padding:.85rem; background:#0066cc; color:#fff; font-family:'Open Sans',sans-serif; font-size:.9rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; border:none; border-radius:5px; cursor:pointer; transition:background .2s,transform .15s; margin-bottom:.7rem; }
    .btn-login:hover { background:#0052a3; transform:translateY(-1px); }
    .btn-login:active { transform:translateY(0); }
    .btn-login:disabled { opacity:.6; cursor:not-allowed; transform:none; }

    .btn-back { display:block; width:100%; padding:.75rem; background:transparent; color:#666; font-family:'Open Sans',sans-serif; font-size:.82rem; font-weight:600; text-align:center; border:1.5px solid #ccd4df; border-radius:5px; cursor:pointer; text-decoration:none; transition:border-color .2s,color .2s; }
    .btn-back:hover { border-color:#0066cc; color:#0066cc; }

    .footer { margin-top:1.8rem; font-size:.7rem; color:#aaa; letter-spacing:.06em; text-align:center; }

    @media(max-width:380px) { .card { padding:2rem 1.2rem; } }
  </style>
</head>
<body>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<div class="header-bar"></div>

<div class="page">
  <div class="card">

    <div class="card-header">
      <div class="logos">
        <img class="logo-img" src="gecc-logo.jpg" alt="GECC"/>
        <div class="logo-divider"></div>
        <img class="logo-img" src="uniport-logo.jpg" alt="Uniport"/>
      </div>
      <div class="card-title">Member Portal</div>
      <div class="card-sub">GECC Uniport Chapter</div>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="form-group">
      <label for="fEmail">Email Address</label>
      <div class="input-wrap">
        <input type="email" id="fEmail" placeholder="your@email.com" autocomplete="email"/>
      </div>
    </div>

    <div class="form-group">
      <label for="fPass">Password</label>
      <div class="input-wrap">
        <input type="password" id="fPass" placeholder="Enter your password" autocomplete="current-password"/>
        <button class="eye-btn" id="eyeBtn" type="button" aria-label="Show/hide password">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>
    <a href="index.html" class="btn-back">← Back to Home</a>

  </div>
  <div class="footer">GECC Uniport &nbsp;·&nbsp; Member Management Portal</div>
</div>

<script>
  // If already logged in, fetch real role then redirect
  auth.onAuthStateChanged(user => {
    if (user) {
      getUserRoleFromDB(user.uid).then(role => {
        if (role) {
          localStorage.setItem('userRole', role);
          localStorage.setItem('userEmail', user.email);
          window.location.href = 'dashboard.html';
        } else {
          auth.signOut();
          showFeedback('Your account is not set up yet. Contact the admin.', 'error');
        }
      });
    }
  });

  const fEmail   = document.getElementById('fEmail');
  const fPass    = document.getElementById('fPass');
  const loginBtn = document.getElementById('loginBtn');
  const fb       = document.getElementById('feedback');
  const eyeBtn   = document.getElementById('eyeBtn');
  const eyeIcon  = document.getElementById('eyeIcon');

  [fEmail, fPass].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  });

  let visible = false;
  eyeBtn.addEventListener('click', () => {
    visible = !visible;
    fPass.type = visible ? 'text' : 'password';
    eyeIcon.innerHTML = visible
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  });

  function showFeedback(msg, type) {
    fb.textContent = msg;
    fb.className = 'feedback show ' + type;
  }

  function doLogin() {
    const email = fEmail.value.trim();
    const pass  = fPass.value;

    fEmail.classList.remove('invalid');
    fPass.classList.remove('invalid');
    fb.className = 'feedback';

    if (!email) { fEmail.classList.add('invalid'); showFeedback('Please enter your email.', 'error'); return; }
    if (!pass)  { fPass.classList.add('invalid');  showFeedback('Please enter your password.', 'error'); return; }

    loginBtn.disabled = true;
    loginBtn.textContent = 'Signing in…';

    auth.signInWithEmailAndPassword(email, pass)
      .then(cred => {
        return getUserRoleFromDB(cred.user.uid).then(role => {
          if (!role) {
            return auth.signOut().then(() => {
              showFeedback('Your account has no role assigned. Contact the admin.', 'error');
              loginBtn.disabled = false;
              loginBtn.textContent = 'Sign In';
            });
          }
          localStorage.setItem('userRole', role);
          localStorage.setItem('userEmail', cred.user.email);
          showFeedback('✓ Logged in as ' + (role === 'admin' ? 'Admin' : 'Member') + '. Redirecting…', 'success');
          setTimeout(() => window.location.href = 'dashboard.html', 900);
        });
      })
      .catch(err => {
        let msg = 'Incorrect email or password.';
        if (err.code === 'auth/user-not-found')     msg = 'No account found with this email.';
        if (err.code === 'auth/wrong-password')     msg = 'Incorrect password. Try again.';
        if (err.code === 'auth/invalid-email')      msg = 'Invalid email address.';
        if (err.code === 'auth/too-many-requests')  msg = 'Too many attempts. Try again later.';
        if (err.code === 'auth/invalid-credential') msg = 'Incorrect email or password.';
        showFeedback(msg, 'error');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      });
  }
</script>

</body>
</html>
